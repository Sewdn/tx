# Gittenberg GraphQL schema (entry point)
#
# Modular SDL under `domain/graphql/`. Merge order is lexicographic by filename prefix.
# Validate: `tx-admin domain validate-schema` (from @tx/cli-admin).
#
# Module map:
#   00-scalars.graphql      — scalars, package documentation
#   01-common.graphql       — Node, pagination, delete payload
#   10-value-types.graphql  — JSON field shapes (tags, diff, lineage, UI seed types)
#   20–28-*.graphql         — nine CRUD entities + inputs
#   30-ui-seed.graphql      — GittenbergUiSeed (non-CRUD presentation bundle)
#   40-aggregates.graphql   — GittenbergSnapshot, GittenbergPorts
#   50-operations.graphql   — Query, Mutation
#
# TypeScript implementation: `@tx/domain-shared` (Effect Schema) + `@tx/gittenberg-data` (seed, ports).
