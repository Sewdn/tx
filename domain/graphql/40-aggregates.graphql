"""
Aggregate read model matching `loadGittenbergSnapshot` in `@tx/gittenberg-data-react`
and `GittenbergPorts` in `@tx/gittenberg-data`.
"""
type GittenbergSnapshot {
  repositories: [Repository!]!
  manuscriptFiles: [ManuscriptFile!]!
  revisions: [Revision!]!
  agents: [Agent!]!
  literaryBuilds: [LiteraryBuild!]!
  libraryEditions: [LibraryEdition!]!
  activityEvents: [ActivityEvent!]!
  readerChapters: [ReaderChapter!]!
  metricSnapshots: [MetricSnapshot!]!
  authors: [Author!]!
  patrons: [Patron!]!
  permawebAnchors: [PermawebAnchor!]!
  provenanceCertificates: [ProvenanceCertificate!]!
  membershipPlans: [MembershipPlan!]!
  userMemberships: [UserMembership!]!
  userCollections: [UserCollection!]!
  collectionItems: [CollectionItem!]!
  discoveryShelves: [DiscoveryShelf!]!
  curatedCollections: [CuratedCollection!]!
  creativeStudioSessions: [CreativeStudioSession!]!
  printProducts: [PrintProduct!]!
  printOrders: [PrintOrder!]!
  ui: GittenbergUiSeed!
  editorSample: EditorSampleContent!
}

"""
Port surface implemented by SQLite, localStorage, and in-memory backends.
Each field maps 1:1 to a `*Port` on `GittenbergPorts` in TypeScript.
"""
type GittenbergPorts {
  repository: RepositoryPort!
  manuscriptFile: ManuscriptFilePort!
  revision: RevisionPort!
  agent: AgentPort!
  literaryBuild: LiteraryBuildPort!
  libraryEdition: LibraryEditionPort!
  activityEvent: ActivityEventPort!
  readerChapter: ReaderChapterPort!
  metricSnapshot: MetricSnapshotPort!
  author: AuthorPort!
  patron: PatronPort!
  permawebAnchor: PermawebAnchorPort!
  provenanceCertificate: ProvenanceCertificatePort!
  membershipPlan: MembershipPlanPort!
  userMembership: UserMembershipPort!
  userCollection: UserCollectionPort!
  collectionItem: CollectionItemPort!
  discoveryShelf: DiscoveryShelfPort!
  curatedCollection: CuratedCollectionPort!
  creativeStudioSession: CreativeStudioSessionPort!
  printProduct: PrintProductPort!
  printOrder: PrintOrderPort!
}

type RepositoryPort {
  create(input: CreateRepositoryInput!): Repository!
  getById(id: EntityId!): Repository
  list(pagination: PaginationInput!): RepositoryPage!
  update(id: EntityId!, input: UpdateRepositoryInput!): Repository!
  remove(id: EntityId!): DeletePayload!
}

type ManuscriptFilePort {
  create(input: CreateManuscriptFileInput!): ManuscriptFile!
  getById(id: EntityId!): ManuscriptFile
  list(pagination: PaginationInput!): ManuscriptFilePage!
  update(id: EntityId!, input: UpdateManuscriptFileInput!): ManuscriptFile!
