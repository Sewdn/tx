type Query {
  """Full client snapshot (TanStack Query key: `['gittenberg', 'snapshot', namespace]`)."""
  gittenbergSnapshot: GittenbergSnapshot!

  repository(id: EntityId!): Repository
  repositoryBySlug(slug: String!): Repository

  manuscriptFile(id: EntityId!): ManuscriptFile
  revision(id: EntityId!): Revision
  agent(id: EntityId!): Agent
  literaryBuild(id: EntityId!): LiteraryBuild
  libraryEdition(id: EntityId!): LibraryEdition
  activityEvent(id: EntityId!): ActivityEvent
  readerChapter(id: EntityId!): ReaderChapter
  metricSnapshot(id: EntityId!): MetricSnapshot
  author(id: EntityId!): Author
  patron(id: EntityId!): Patron
  permawebAnchor(id: EntityId!): PermawebAnchor
  provenanceCertificate(id: EntityId!): ProvenanceCertificate
  membershipPlan(id: EntityId!): MembershipPlan
  userMembership(id: EntityId!): UserMembership
  userCollection(id: EntityId!): UserCollection
  collectionItem(id: EntityId!): CollectionItem
  discoveryShelf(id: EntityId!): DiscoveryShelf
  curatedCollection(id: EntityId!): CuratedCollection
  creativeStudioSession(id: EntityId!): CreativeStudioSession
  printProduct(id: EntityId!): PrintProduct
  printOrder(id: EntityId!): PrintOrder

  repositories(pagination: PaginationInput!): RepositoryPage!
  manuscriptFiles(pagination: PaginationInput!): ManuscriptFilePage!
  revisions(pagination: PaginationInput!): RevisionPage!
  agents(pagination: PaginationInput!): AgentPage!
  literaryBuilds(pagination: PaginationInput!): LiteraryBuildPage!
  libraryEditions(pagination: PaginationInput!): LibraryEditionPage!
  activityEvents(pagination: PaginationInput!): ActivityEventPage!
  readerChapters(pagination: PaginationInput!): ReaderChapterPage!
  metricSnapshots(pagination: PaginationInput!, scope: MetricScope): MetricSnapshotPage!
  authors(pagination: PaginationInput!): AuthorPage!
  patrons(pagination: PaginationInput!): PatronPage!
  permawebAnchors(pagination: PaginationInput!): PermawebAnchorPage!
  provenanceCertificates(pagination: PaginationInput!): ProvenanceCertificatePage!
  membershipPlans(pagination: PaginationInput!): MembershipPlanPage!
  userMemberships(pagination: PaginationInput!): UserMembershipPage!
  userCollections(pagination: PaginationInput!): UserCollectionPage!
  collectionItems(pagination: PaginationInput!): CollectionItemPage!
  discoveryShelves(pagination: PaginationInput!): DiscoveryShelfPage!
  curatedCollections(pagination: PaginationInput!): CuratedCollectionPage!
  creativeStudioSessions(pagination: PaginationInput!): CreativeStudioSessionPage!
  printProducts(pagination: PaginationInput!): PrintProductPage!
  printOrders(pagination: PaginationInput!): PrintOrderPage!
}

