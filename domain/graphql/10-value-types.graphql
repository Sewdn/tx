# --- Repository JSON (`Repository.tags`, `Repository.metadata`) ---

enum RepositoryTagVariant {
  PUBLIC_DOMAIN
  AGENT_CURATED
  VERSION
  SCHOLARLY_EDITION
  ETERNAL
  PREMIER_ONLY
}

enum AccessTier {
  FREE
  PREMIER
  MECENE_PATRON
}

enum ProvenanceStatus {
  VERIFIED
  PENDING
  UNVERIFIED
}

enum StewardshipLevel {
  HIGH_FIDELITY
  MANUSCRIPT_SCAN
  OCR_VALIDATED
  COMMUNITY_PEER_REVIEWED
}

enum CoverMode {
  ORIGINAL_ART
  SCHOLARLY_MINIMAL
  AGENT_GENERATED
}

enum PrintOrderStatus {
  CUSTOMIZATION
  SHIPPING
  PAYMENT
  SUBMITTED
  FULFILLING
  SHIPPED
  DELIVERED
}

enum BillingPeriod {
  MONTHLY
  ANNUAL
}

enum CollectionKind {
  CURRENT_READS
  ARCHIVE
  WISHLIST
  CUSTOM_FOLDER
}

enum ShelfType {
  FEATURED_HERO
  CONTINUE_READING
  TRENDING
  DECADE
  THEMATIC
  AUTHOR_SPOTLIGHT
  RECENT_BUILDS
  CURATED
}

enum ShelfLayout {
  HORIZONTAL_PORTRAIT
  HORIZONTAL_LANDSCAPE
  GRID
  BENTO_FEATURED
}

enum CreativeAgentSpecialty {
  WOODCUT
  VICTORIAN_PATTERN
  ENGRAVING
  SILVERPOINT
  CHARCOAL
}

enum AgentRole {
  CURATION
  CREATIVE_STUDIO
}

enum IllustrationStyle {
  PENCIL_SKETCH
  SILVERPOINT
  CHARCOAL
  ETCHING
}

enum StudioSessionStatus {
  DRAFT
  RENDERING
  READY_FOR_BUILD
  SENT_TO_PRINT
}

enum StockStatus {
  IN_STOCK
  PRINT_IN_PROGRESS
  OUT_OF_STOCK
}

type WorkProvenance {
  status: ProvenanceStatus!
  citationCount: Int!
  archiveSizeLabel: FileSizeLabel!
  lensLabel: String!
}

type MembershipFeature {
  icon: MaterialIcon!
  title: String!
  description: String!
}

type CollectionFilterDefaults {
  eras: [String!]!
  themes: [String!]!
  formats: [LibraryFormatIcon!]!
}

type BindingOption {
  id: EntityId!
  label: String!
  description: String!
  priceCents: Int!
  isDefault: Boolean
}

type PostalAddress {
  name: String!
  line1: String!
  line2: String
  city: String!
  region: String!
  postalCode: String!
  countryCode: String!
}

type RepositoryTag {
  variant: RepositoryTagVariant!
  label: String!
}

type MetadataField {
  label: String!
  value: String!
  href: String
}

# --- Revision JSON (`Revision.breadcrumbs`, `diffLines`, `comments`) ---

enum RevisionStatus {
  OPEN
  MERGED
  CLOSED
}

type BreadcrumbSegment {
  label: String!
}

enum DiffLineVariant {
  CONTEXT
  ADDED
  REMOVED
}

type DiffLine {
  id: EntityId!
  variant: DiffLineVariant!
  oldLine: Int
  newLine: Int
  content: String!
  icon: MaterialIcon
}

type RevisionComment {
  id: EntityId!
  author: String!
  timestamp: DisplayTimestamp!
  body: String!
}

# --- LiteraryBuild JSON ---

type LineageBranch {
  id: EntityId!
  title: String!
  badge: String
  description: String!
  """Output format labels for this fork, e.g. `EPUB (FR)`."""
  formats: [String!]!
  isDefault: Boolean
  isLast: Boolean
  forkCount: Int
  isHead: Boolean
}

type FormatArtifact {
  id: EntityId!
  icon: MaterialIcon!
  title: String!
  description: String!
  size: FileSizeLabel!
  """When format is physical, links to a print SKU."""
  printProductId: EntityId
  priceCents: Int
}

enum BuildStatusVariant {
  SUCCESS
  NEUTRAL
}

type BuildStatusItem {
  label: String!
  value: String!
  variant: BuildStatusVariant
}

type ArchivalVersionRow {
  id: EntityId!
  version: String!
  note: String!
  binding: String!
  date: String!
}

type FormatOption {
  id: EntityId!
  icon: MaterialIcon!
  title: String!
  description: String!
  selected: Boolean
}

type DesignPreset {
  id: EntityId!
  label: String!
  active: Boolean
}

type StylingSliderOption {
  id: EntityId!
  label: String!
  value: String!
  progress: Int
}

type StylingToggleOption {
  id: EntityId!
  label: String!
  enabled: Boolean!
}

type LiteraryBuildStyling {
  sliders: [StylingSliderOption!]!
  toggles: [StylingToggleOption!]!
}

# --- Agent presentation ---

enum AgentStatusVariant {
  OPERATIONAL
  PAUSED
  ERROR
}

enum AgentIconVariant {
  SECONDARY
  PRIMARY
  MUTED
}

# --- Activity feed ---

enum ActivityTagVariant {
  SECONDARY
  MUTED
  ERROR
  PATRONAGE
  PRINT
}

enum ActivityEventType {
  REPOSITORY_CREATED
  OCR_COMPLETED
  VALIDATION_FAILED
  ANCHOR_FUNDED
  ANCHOR_CONFIRMED
  CERTIFICATE_ISSUED
  PRINT_ORDER_SUBMITTED
}

enum ActivityDotVariant {
  SECONDARY
  PRIMARY
  ERROR
}

# --- Metrics ---

enum MetricScope {
  """Global agent dashboard (`seedMetricSnapshots` ids `metric-*`)."""
  AGENTS
  """Per-repository overview cards (`metric-repo-*`)."""
  REPOSITORY
}

# --- Library catalog ---

"""Icon names for library edition format chips (seed uses Material icon ids)."""
scalar LibraryFormatIcon

# --- UI seed (`GittenbergUiSeed` in `@tx/gittenberg-data`) ---

type FooterLink {
  label: String!
  href: String!
}

type SidebarNavItem {
  id: EntityId!
  label: String!
  icon: MaterialIcon!
  href: String!
}

type FileTreeNode {
  id: EntityId!
  name: String!
  icon: MaterialIcon!
  active: Boolean
  highlighted: Boolean
  children: [FileTreeNode!]
}

type LibraryAuthorFilter {
  id: EntityId!
  label: String!
  checked: Boolean
}

type CurationBar {
  id: EntityId!
  label: String!
  heightPercent: Int!
  fillPercent: Int!
}

type CanvasTheme {
  id: EntityId!
  color: String!
  active: Boolean
}
