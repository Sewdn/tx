"""
Catalog entry in the global library of builds (not repository-scoped).
Seed: `seedLibraryEditions` (Moby Dick, Foundation, Pride and Prejudice).
"""
type LibraryEdition implements Node {
  id: EntityId!
  createdAt: DateTime!
  updatedAt: DateTime!

  title: String!
  author: String!
  genre: String!
  year: String!
  coverUrl: String!
  commit: String!
  """Material icon ids for available formats, e.g. `picture_as_pdf`."""
  formats: [LibraryFormatIcon!]!
  badge: String!

  repositoryId: EntityId
  primaryBuildId: EntityId
  authorId: EntityId
  heroImageUrl: String
  tagline: String
  lensLabel: String
  relatedEditionIds: [EntityId!]!
  sortKey: String
  decadeLabel: String
  requiredTier: AccessTier
  anchorStatus: StewardshipLevel
  arweaveTxId: String
  patronCreditName: String
  isEternal: Boolean!
  provenance: WorkProvenance
}

type LibraryEditionPage implements EntityPage {
  pageInfo: PageInfo!
  items: [LibraryEdition!]!
}

input WorkProvenanceInput {
  status: ProvenanceStatus!
  citationCount: Int!
  archiveSizeLabel: FileSizeLabel!
  lensLabel: String!
}

input CreateLibraryEditionInput {
  title: String!
  author: String!
  genre: String!
  year: String!
  coverUrl: String!
  commit: String!
  formats: [LibraryFormatIcon!]!
  badge: String!
  repositoryId: EntityId
  primaryBuildId: EntityId
  authorId: EntityId
  heroImageUrl: String
  tagline: String
  lensLabel: String
  relatedEditionIds: [EntityId!]
  sortKey: String
  decadeLabel: String
  requiredTier: AccessTier
  anchorStatus: StewardshipLevel
  arweaveTxId: String
  patronCreditName: String
  isEternal: Boolean!
  provenance: WorkProvenanceInput
}

input UpdateLibraryEditionInput {
  title: String
  author: String
  genre: String
  year: String
  coverUrl: String
  commit: String
  formats: [LibraryFormatIcon!]
  badge: String
  repositoryId: EntityId
  primaryBuildId: EntityId
  authorId: EntityId
  heroImageUrl: String
  tagline: String
  lensLabel: String
  relatedEditionIds: [EntityId!]
  sortKey: String
  decadeLabel: String
  requiredTier: AccessTier
  anchorStatus: StewardshipLevel
  arweaveTxId: String
  patronCreditName: String
  isEternal: Boolean
  provenance: WorkProvenanceInput
}
