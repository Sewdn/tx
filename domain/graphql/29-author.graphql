"""
Author profile for book detail and curated collections.
Seed: `seedAuthors` (Isaac Asimov, Herman Melville).
"""
type Author implements Node {
  id: EntityId!
  createdAt: DateTime!
  updatedAt: DateTime!

  slug: String!
  name: String!
  birthYear: Int
  deathYear: Int
  portraitUrl: String!
  biography: String!
  collectionId: EntityId
}

type AuthorPage implements EntityPage {
  pageInfo: PageInfo!
  items: [Author!]!
}

input CreateAuthorInput {
  slug: String!
  name: String!
  birthYear: Int
  deathYear: Int
  portraitUrl: String!
  biography: String!
  collectionId: EntityId
}

input UpdateAuthorInput {
  slug: String
  name: String
  birthYear: Int
  deathYear: Int
  portraitUrl: String
  biography: String
  collectionId: EntityId
}
